<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>通用棄將羽球管理系統</title>
<style>
:root {
  --primary: #1D9E75;
  --primary-light: #E1F5EE;
  --primary-dark: #0F6E56;
  --admin-color: #534AB7;
  --admin-light: #EEEDFE;
  --admin-dark: #3C3489;
  --accent: #BA7517;
  --accent-light: #FAEEDA;
  --danger: #A32D2D;
  --danger-light: #FCEBEB;
  --bg: #F8FAF9;
  --surface: #FFFFFF;
  --border: rgba(0,0,0,0.09);
  --text: #1a1a1a;
  --text-muted: #5F5E5A;
  --text-light: #888780;
  --radius: 10px;
  --shadow: 0 1px 4px rgba(0,0,0,0.07);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', -apple-system, sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.6; }

/* Header */
.header { background: var(--primary); color: white; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
.header-left { display: flex; flex-direction: column; }
.header-title { font-size: 17px; font-weight: 600; }
.header-sub { font-size: 12px; opacity: 0.8; }
.header-right { display: flex; align-items: center; gap: 10px; }
.admin-badge { background: var(--admin-color); padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; letter-spacing: 0.3px; }
.user-badge { background: rgba(255,255,255,0.2); padding: 6px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; transition: background 0.2s; }
.user-badge:hover { background: rgba(255,255,255,0.35); }

/* Layout */
.container { max-width: 1100px; margin: 0 auto; padding: 20px 16px; }

/* Tabs */
.tabs { display: flex; gap: 4px; background: var(--surface); border-radius: var(--radius); padding: 4px; margin-bottom: 20px; box-shadow: var(--shadow); border: 1px solid var(--border); flex-wrap: wrap; }
.tab { flex: 1; min-width: 80px; padding: 9px 6px; border: none; background: transparent; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text-muted); transition: all 0.2s; white-space: nowrap; }
.tab.active { background: var(--primary); color: white; }
.tab.admin-tab.active { background: var(--admin-color); color: white; }
.tab:hover:not(.active) { background: var(--primary-light); color: var(--primary); }
.tab.admin-tab:hover:not(.active) { background: var(--admin-light); color: var(--admin-dark); }

/* Cards */
.card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); padding: 20px; margin-bottom: 16px; }
.card-title { font-size: 15px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

/* Grid */
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
@media (max-width: 700px) { .grid-3, .grid-4 { grid-template-columns: repeat(2, 1fr); } }

/* Stat cards */
.stat-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; text-align: center; }
.stat-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.stat-value { font-size: 24px; font-weight: 700; }
.green { color: var(--primary); }
.amber { color: var(--accent); }
.red { color: var(--danger); }
.purple { color: var(--admin-color); }

/* Form */
input, select { border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 14px; color: var(--text); background: var(--surface); outline: none; transition: border-color 0.2s; }
input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(29,158,117,0.1); }
input[type="date"] { color: #1a4fad; font-weight: 600; }

/* Buttons */
.btn { padding: 8px 16px; border-radius: 8px; border: none; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-secondary { background: var(--primary-light); color: var(--primary-dark); }
.btn-secondary:hover { background: #c0e8d8; }
.btn-admin { background: var(--admin-light); color: var(--admin-dark); }
.btn-admin:hover { background: #d8d5f8; }
.btn-danger { background: var(--danger-light); color: var(--danger); }
.btn-danger:hover { background: #f5c1c1; }
.btn-sm { padding: 5px 11px; font-size: 13px; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Date row */
.date-row { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }

/* Time slots */
.member-row { display: flex; align-items: center; padding: 10px 12px; border-bottom: 1px solid rgba(0,0,0,0.05); gap: 10px; flex-wrap: wrap; }
.member-row:last-child { border-bottom: none; }
.member-name { font-weight: 500; min-width: 55px; font-size: 14px; }
.member-slots { display: flex; gap: 7px; flex: 1; flex-wrap: wrap; }
.slot-check { display: flex; align-items: center; gap: 5px; padding: 5px 10px; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; font-size: 13px; transition: all 0.15s; user-select: none; }
.slot-check.checked { background: var(--primary-light); border-color: var(--primary); color: var(--primary-dark); font-weight: 500; }
.slot-check.locked { cursor: not-allowed; opacity: 0.6; }
.slot-check .cb { width: 15px; height: 15px; border: 1.5px solid #ccc; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 10px; flex-shrink: 0; transition: all 0.15s; }
.slot-check.checked .cb { background: var(--primary); border-color: var(--primary); color: white; }

/* Table */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
th { text-align: left; padding: 9px 12px; font-size: 11px; font-weight: 600; color: var(--text-muted); background: var(--bg); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
td { padding: 10px 12px; border-bottom: 1px solid rgba(0,0,0,0.04); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(29,158,117,0.03); }

/* Badges */
.badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 12px; font-weight: 500; }
.badge-green { background: var(--primary-light); color: var(--primary-dark); }
.badge-amber { background: var(--accent-light); color: #633806; }
.badge-red { background: var(--danger-light); color: var(--danger); }
.badge-gray { background: #f1f0ee; color: #5F5E5A; }
.badge-admin { background: var(--admin-light); color: var(--admin-dark); }

/* Fee */
.fee-breakdown { background: var(--bg); border-radius: var(--radius); padding: 14px; margin-top: 14px; }
.fee-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 14px; }
.fee-row.total { border-top: 1px solid var(--border); padding-top: 10px; margin-top: 5px; font-weight: 600; font-size: 15px; }

/* Info box */
.info-box { background: var(--primary-light); border-left: 3px solid var(--primary); border-radius: 0 8px 8px 0; padding: 10px 14px; font-size: 13px; color: var(--primary-dark); margin-bottom: 14px; }
.warn-box { background: var(--accent-light); border-left: 3px solid var(--accent); border-radius: 0 8px 8px 0; padding: 10px 14px; font-size: 13px; color: #633806; margin-bottom: 14px; }
.admin-box { background: var(--admin-light); border-left: 3px solid var(--admin-color); border-radius: 0 8px 8px 0; padding: 10px 14px; font-size: 13px; color: var(--admin-dark); margin-bottom: 14px; }

/* Login */
#login-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); display: flex; align-items: center; justify-content: center; z-index: 999; }
.login-card { background: var(--surface); border-radius: 16px; padding: 32px; width: 340px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
.login-logo { text-align: center; font-size: 44px; margin-bottom: 8px; }
.login-title { text-align: center; font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.login-sub { text-align: center; font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }
.login-field { margin-bottom: 14px; }
.login-field label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 5px; color: var(--text-muted); }
.login-field select, .login-field input { width: 100%; }

/* Modal */
.modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: center; justify-content: center; z-index: 500; }
.modal { background: var(--surface); border-radius: 14px; padding: 28px; width: 420px; max-width: 95vw; box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
.modal-title { font-size: 16px; font-weight: 600; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }
.modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
.modal-field { margin-bottom: 14px; }
.modal-field label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 5px; color: var(--text-muted); }
.modal-field input, .modal-field select { width: 100%; }

/* Toast */
.toast { position: fixed; bottom: 24px; right: 24px; background: #1a1a1a; color: white; padding: 12px 20px; border-radius: 8px; font-size: 14px; z-index: 9999; opacity: 0; transform: translateY(8px); transition: all 0.3s; pointer-events: none; max-width: 280px; }
.toast.show { opacity: 1; transform: translateY(0); }
.toast.success { background: var(--primary-dark); }
.toast.error { background: var(--danger); }
.toast.info { background: var(--admin-color); }

/* Log */
.log-item { padding: 10px 0; border-bottom: 1px solid rgba(0,0,0,0.05); font-size: 13px; }
.log-item:last-child { border-bottom: none; }

/* Divider */
hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

/* Page */
.page { display: none; }
.page.active { display: block; }
.loading { text-align: center; padding: 40px; color: var(--text-muted); font-size: 14px; }

/* Amount input */
.amount-edit { display: flex; align-items: center; gap: 7px; }
.amount-input { width: 85px; }

/* Section header */
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.section-title { font-size: 15px; font-weight: 600; }

/* Permission lock icon */
.lock-msg { font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; padding: 10px 0; }
</style>
</head>
<body>

<!-- Login -->
<div id="login-overlay">
  <div class="login-card">
    <div class="login-logo"></div>
    <div class="login-title">通用棄將羽球管理系統</div>
    <div class="login-sub">每週六 10:00 ~ 12:00 ｜ 每場2小時費用 1200元</div>
    <div class="login-field">
      <label>選擇您的姓名</label>
      <select id="login-name" onchange="onLoginNameChange()"><option value="">- 請選擇 -</option></select>
    </div>
    <div class="login-field" id="pw-field">

    <button class="btn btn-primary" style="width:100%;justify-content:center;padding:11px;" onclick="doLogin()">進入系統</button>

  </div>
</div>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <div class="header-title">通用棄將羽球管理系統</div>
    <div class="header-sub">每週六 10:00 ~ 12:00 ｜ 每場2小時費用 1200元</div>
  </div>
  <div class="header-right">
    <span class="admin-badge" id="role-badge" style="display:none">管理權限</span>
    <div class="user-badge" id="current-user-badge" onclick="logout()">登出</div>
  </div>
</div>

<!-- Main -->
<div class="container">
  <div class="tabs" id="main-tabs">
    <button class="tab active" onclick="switchTab('attend')">[報名]</button>
    <button class="tab" onclick="switchTab('fee')">[公費資訊]</button>
    <!-- Additional tabs injected by JS -->

  <!-- Tab: Attend -->
  <div id="page-attend" class="page active">
    <div class="card">
      <div class="section-header">
        <div class="section-title">選擇週六日期</div>
      </div>
      <div class="date-row">
        <input type="date" id="attend-date" />

        <button class="btn btn-primary" onclick="loadAttendance()">載入</button>

    </div>
    <div id="attend-content"><div class="loading">請選擇日期後載入</div></div>
  </div>

  <!-- Tab: Fee overview -->
  <div id="page-fee" class="page">

  </div>


  <!-- Tab: Members -->
  <div id="page-members" class="page">
    <div id="members-admin-box" style="display:none"></div>

      <div class="section-header">

      </div>

<!-- Modal: Edit Prepaid -->

<!-- Modal: Court Fee -->

// ===========================================================
// FIRESTORE HELPERS
// ===========================================================
const FS_BASE = `https://firestore.googleapis.com/v1/projects/${FIREBASE_PROJECT}/databases/(default)/documents`;

async function fsGet(docPath) {
  try {
    const r = await fetch(`${FS_BASE}/${docPath}?key=${FIREBASE_API_KEY}`);
    if (r.status === 404) return null; // doc doesn't exist yet, not an error
    if (!r.ok) {
      const err = await r.json().catch(()=>({}));
      console.warn('[fsGet]', r.status, docPath, err?.error?.message || '');
      return null;
    }
    const d = await r.json();
    return fsDecodeDoc(d.fields);
  } catch(e) { console.warn('[fsGet exception]', docPath, e); return null; }
}

async function fsSet(docPath, data) {
  try {
    const fields = fsEncodeDoc(data);
    const r = await fetch(
      `${FS_BASE}/${docPath}?key=${FIREBASE_API_KEY}`,
      { method: 'PATCH', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fields }) }
    );
    if (!r.ok) {
      const err = await r.json().catch(()=>({}));
      console.error('[fsSet FAILED]', r.status, docPath, err?.error?.message || '');
      return false;
    }
    return true;
  } catch(e) { console.error('[fsSet exception]', docPath, e); return false; }
}

async function fsDelete(docPath) {
  try {
    await fetch(`${FS_BASE}/${docPath}?key=${FIREBASE_API_KEY}`, { method: 'DELETE' });
  } catch {}
}

async function fsList(collectionPath) {
  try {
    const r = await fetch(`${FS_BASE}/${collectionPath}?key=${FIREBASE_API_KEY}`);
    if (!r.ok) return [];
    const d = await r.json();
    return (d.documents || []).map(doc => ({
      id: doc.name.split('/').pop(),
      data: fsDecodeDoc(doc.fields)
    }));
  } catch { return []; }
}

// Firestore value encoding/decoding
function fsEncodeVal(v) {
  if (v === null || v === undefined) return { nullValue: null };
  if (typeof v === 'boolean') return { booleanValue: v };
  if (typeof v === 'number') return Number.isInteger(v) ? { integerValue: String(v) } : { doubleValue: v };
  if (typeof v === 'string') return { stringValue: v };
  if (Array.isArray(v)) return { arrayValue: { values: v.map(fsEncodeVal) } };
  if (typeof v === 'object') return { mapValue: { fields: fsEncodeDoc(v) } };
  return { stringValue: String(v) };
}
function fsEncodeDoc(obj) {
  const fields = {};
  for (const [k, v] of Object.entries(obj || {})) fields[k] = fsEncodeVal(v);
  return fields;
}
function fsDecodeVal(v) {
  if (!v) return null;
  if ('nullValue' in v) return null;
  if ('booleanValue' in v) return v.booleanValue;
  if ('integerValue' in v) return parseInt(v.integerValue);
  if ('doubleValue' in v) return v.doubleValue;
  if ('stringValue' in v) return v.stringValue;
  if ('arrayValue' in v) return (v.arrayValue.values || []).map(fsDecodeVal);
  if ('mapValue' in v) return fsDecodeDoc(v.mapValue.fields);
  return null;
}
function fsDecodeDoc(fields) {
  if (!fields) return {};
  const obj = {};
  for (const [k, v] of Object.entries(fields)) obj[k] = fsDecodeVal(v);
  return obj;
}

// STORAGE (Firestore)

// In-memory cache to keep UI snappy
const _cache = {};
function lsGet(k) { return _cache[k] !== undefined ? _cache[k] : null; }
function lsSet(k, v) { _cache[k] = v; return true; }

async function cloudGet(k) {
  const data = await fsGet(`app/${k}`);
  if (data && data.v !== undefined) { _cache[k] = data.v; return data.v; }
  return null;
}
async function cloudSet(k, v) {
  _cache[k] = v;
  return fsSet(`app/${k}`, { v });
}
async function cloudDelete(k) {
  delete _cache[k];
  return fsDelete(`app/${k}`);
}

async function getMembersConfigAsync() {
  const v = await cloudGet('membersConfig');
  return v || DEFAULT_MEMBERS_DATA.map(m => ({ ...m }));
}
function getMembersConfig() {
  return lsGet('membersConfig') || DEFAULT_MEMBERS_DATA.map(m => ({ ...m }));
}
async function saveMembersConfig(cfg) {
  lsSet('membersConfig', cfg);
  await cloudSet('membersConfig', cfg);
}

function getMemberNames() {
  return getMembersConfig().filter(m => m.role !== 'guest').map(m => m.name);
}
function getAdminNames() {
  return getMembersConfig().filter(m => m.role === 'admin').map(m => m.name);
}

async function getAttendDocAsync(date) {
  const v = await cloudGet(`att_${date}`);
  return v || {};
}
function getAttendDoc(date) { return lsGet(`att_${date}`) || {}; }
async function saveAttendDoc(date, data) {
  lsSet(`att_${date}`, data);
  await cloudSet(`att_${date}`, data);

async function deleteAttendDoc(date) {

}

function getLogs() { return lsGet('logs') || []; }

  if (logs.length > 200) logs.length = 200;
  lsSet('logs', logs);
  await cloudSet('logs', logs);
}

function getMemberHistory(name) { return lsGet('mhist_' + name) || []; }
async function addMemberHistory(name, entry) {

function getHistoryDates() {
  return Object.keys(_cache).filter(k => k.startsWith('att_')).map(k => k.replace('att_', '')).sort().reverse();

// Load all data from Firestore into cache on startup
async function loadAllFromCloud() {
  showToast('載入雲端資料中...', 'info');

  // 1. Load membersConfig - if not in cloud, write defaults
  const mcCloud = await cloudGet('membersConfig');
  if (mcCloud !== null) {
    lsSet('membersConfig', mcCloud);
  } else {
    // First time: write default members to Firestore
    const defaults = DEFAULT_MEMBERS_DATA.map(m => ({ ...m }));
    lsSet('membersConfig', defaults);
    await cloudSet('membersConfig', defaults);
  }

  // 2. Load logs and fundLog
  const logsCloud = await cloudGet('logs');
  if (logsCloud !== null) lsSet('logs', logsCloud);

  const fundCloud = await cloudGet('fundLog');
  if (fundCloud !== null) lsSet('fundLog', fundCloud);

  // 3. Load mhist_ for each member
  const mc = getMembersConfig();
  await Promise.all(
    mc.filter(m => m.role !== 'guest').map(async m => {
      const v = await cloudGet('mhist_' + m.name);
      if (v !== null) lsSet('mhist_' + m.name, v);
    })
  );

  // 4. Load attendance docs via paginated list
  let pageToken = null;
  do {
    const url = `${FS_BASE}/app?key=${FIREBASE_API_KEY}&pageSize=100${pageToken ? '&pageToken=' + pageToken : ''}`;
    try {
      const r = await fetch(url);
      if (!r.ok) break;
      const d = await r.json();
      for (const doc of (d.documents || [])) {
        const id = doc.name.split('/').pop();
        if (id.startsWith('att_')) {
          const decoded = fsDecodeDoc(doc.fields);
          _cache[id] = decoded.v !== undefined ? decoded.v : decoded;
        }
      }
      pageToken = d.nextPageToken || null;
    } catch { break; }
  } while (pageToken);

  showToast('雲端資料載入完成', 'success');
}

function onLoginNameChange() {

function doLogin() {
  const name = document.getElementById('login-name').value;
  if (!name) { showToast('請選擇姓名', 'error'); return; }
  const cfg = getMembersConfig().find(m => m.name === name);
  if (!cfg) { showToast('找不到此帳號', 'error'); return; }

  // 遊客不需要密碼
  if (cfg.role !== 'guest') {
    const pw = document.getElementById('login-pw').value;
    if (pw !== DEFAULT_PASSWORD) { showToast('密碼錯誤', 'error'); return; }
  }

  currentUser = name;
  currentRole = cfg.role;
  isAdmin = cfg.role === 'admin';
  isGuest = cfg.role === 'guest';

  document.getElementById('login-overlay').style.display = 'none';
  document.getElementById('current-user-badge').textContent = `${name}  登出`;
  if (isAdmin) document.getElementById('role-badge').style.display = 'inline-block';

  initApp();

function logout() {
  if (!confirm('確定要登出？')) return;
  currentUser = null; currentRole = null; isAdmin = false; isGuest = false;

}

function injectAdminTabs() {
  const tabs = document.getElementById('main-tabs');

function initApp() {
  const sat = nextSaturday(new Date());
  const satStr = fmt(sat);
  // 不得早於 SCHEDULE_START
  const useDate = satStr >= SCHEDULE_START ? satStr : SCHEDULE_START;
  document.getElementById('attend-date').value = useDate;
  // 限制最早日期
  document.getElementById('attend-date').min = SCHEDULE_START;
  loadAttendance();
  // 遊客隱藏報名操作提示
  if (isGuest) {
    const tabs = document.getElementById('main-tabs');
    // 隱藏費用總覽 tab 不隱藏（遊客可看）
  }
}

function nextSaturday(from) {
  const d = new Date(from);
  // If today is Saturday (day=6), return today; otherwise go to next Saturday
  const diff = (6 - d.getDay() + 7) % 7;
  d.setDate(d.getDate() + diff);
  return d;
}
function fmt(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
function fmtDisplay(s) {
  const d = new Date(s + 'T00:00:00');
  return `${s} (週${'日一二三四五六'[d.getDay()]})`;
}
function jumpNextSaturday() {
  document.getElementById('attend-date').value = fmt(nextSaturday(new Date()));
  loadAttendance();
}
function jumpAdminNextSaturday() {
  document.getElementById('admin-attend-date').value = fmt(nextSaturday(new Date()));
  loadAdminAttendance();
}

function switchTab(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`page-${id}`).classList.add('active');
  // Find the matching tab button by its onclick
  document.querySelectorAll('.tab').forEach(t => {
    if (t.getAttribute('onclick') === `switchTab('${id}')`) t.classList.add('active');
  });
  if (id === 'fee')          loadFeeOverview();
  if (id === 'members')      loadMembersTab();
  if (id === 'log')          loadLog();
}

// ===========================================================
// ATTENDANCE (self - member view)
// ===========================================================
async function loadAttendance() {
  const dateStr = document.getElementById('attend-date').value;
  if (!dateStr) { showToast('請選擇日期', 'error'); return; }
  const d = new Date(dateStr + 'T00:00:00');
  if (d.getDay() !== 6) { showToast('請選擇週六日期', 'error'); return; }
  // Try cloud first, fall back to cache
  const cloudData = await cloudGet(`att_${dateStr}`);
  currentDateData = cloudData || getAttendDoc(dateStr);
  renderAttendance(dateStr);
}

function renderAttendance(dateStr) {
  const members = getMemberNames();
  const el = document.getElementById('attend-content');
  const mySlot = currentDateData[currentUser];
  const attendeeCount = computeHourCount(currentDateData, members);

  // 判斷強制全員均分的時機
  // 條件：人數不足（0人 或 不滿4人），且今天已到週一(5天前)含以後
  const today = new Date(); today.setHours(0,0,0,0);
  const satDate = new Date(dateStr + 'T00:00:00');
  const monBefore = new Date(satDate); monBefore.setDate(satDate.getDate() - 5); // 週六前5天=週一
  const friBefore = new Date(satDate); friBefore.setDate(satDate.getDate() - 1); // 週六前1天=週五
  const needsAllSplit = (attendeeCount === 0 || (attendeeCount > 0 && attendeeCount < MIN_PLAYERS)) && today >= monBefore;
  const forceAllSplit = needsAllSplit; // 週一起就均分
  const urgentSplit = needsAllSplit && today >= friBefore; // 週五起加黃底

  const fees = forceAllSplit
    ? computeFeesForceAll(members, currentDateData)
    : computeFees(currentDateData, attendeeCount, members);
  const belowMin = !forceAllSplit && attendeeCount > 0 && attendeeCount < MIN_PLAYERS;

  // Slot selector (not for guests)
  // 鎖定規則：今天2天前（含）的場次，一般成員不能自行修改
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - 2);
  const cutoffStr = fmt(cutoff);
  const selfLocked = dateStr <= cutoffStr;

  const slotSelectorHtml = isGuest ? `<div class="info-box">[覽] 遊客模式：僅能查看，無法修改出席。</div>`
    : selfLocked ? `
    <div style="margin-bottom:12px;font-size:14px;font-weight:500;">選擇您的時段（${currentUser}）：</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;" id="my-slots">
      ${TIME_SLOTS.map(s => `
        <div class="slot-check ${mySlot === s.id ? 'checked' : ''} locked" id="myslot_${s.id}">
          <div class="cb">${mySlot === s.id ? 'v' : ''}</div> ${s.label}
        </div>`).join('')}
      <div class="slot-check ${!mySlot ? 'checked' : ''} locked" id="myslot_none">
        <div class="cb">${!mySlot ? 'v' : ''}</div> 本週不參加
      </div>
    </div>
    <div style="font-size:13px;color:var(--text-muted);margin-bottom:16px;">⛔ 此場次已超過修改期限（僅管理員可編輯）</div>`
    : `
    <div style="margin-bottom:12px;font-size:14px;font-weight:500;">選擇您的時段（${currentUser}）：</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;" id="my-slots">
      ${TIME_SLOTS.map(s => `
        <div class="slot-check ${mySlot === s.id ? 'checked' : ''}" id="myslot_${s.id}" onclick="toggleMySlot('${dateStr}','${s.id}')">
          <div class="cb">${mySlot === s.id ? 'v' : ''}</div> ${s.label}
        </div>`).join('')}
      <div class="slot-check ${!mySlot ? 'checked' : ''}" id="myslot_none" onclick="toggleMySlot('${dateStr}',null)">
        <div class="cb">${!mySlot ? 'v' : ''}</div> 本週不參加
      </div>
    </div>`;

  // Below-min warning / force-all warning
  const warnHtml = forceAllSplit ? `
    <div style="background:${urgentSplit ? '#fff3cd' : '#f5f5f5'};border-left:3px solid ${urgentSplit ? '#f0ad4e' : '#aaa'};border-radius:0 8px 8px 0;padding:10px 14px;margin-bottom:12px;font-size:13px;color:${urgentSplit ? '#7a5c00' : '#555'};">
      <strong>[${urgentSplit ? '!' : 'i'}] 出席人數不足（目前 ${attendeeCount} 人）</strong> - 場地費用由全體 ${members.length} 人均分
    </div>` : '';

  // Merged table: 成員 / 時段 / 費用明細 / 應付 / (管理者編輯)
  const tableRows = fees.map(f => {
    const isMe = f.member === currentUser;
    const forceRow = f.forceAll;
    const rowStyle = isMe ? 'background:var(--primary-light)' : (forceRow && urgentSplit ? 'background:#fff8e1' : '');
    const nameCell = isMe ? `<strong>> ${f.member}（你）</strong>` : f.member;
    const slotCell = f.slotId
      ? `<span class="badge badge-green">${TIME_SLOTS.find(s=>s.id===f.slotId)?.label}</span>`
      : (forceRow ? '<span class="badge badge-amber">未報名</span>' : '<span class="badge badge-gray">未報名</span>');
    const feeCell = f.fee > 0
      ? `<strong style="color:var(--primary-dark)">${f.fee} 元</strong>`
      : '<span style="color:var(--text-light)">-</span>';
    const editBtn = isAdmin
      ? `<button class="btn btn-admin btn-sm" style="padding:2px 8px;font-size:11px;" onclick="showAdminSlotModal('${f.member}','${dateStr}')">編輯</button>`
      : '';
    return `<tr style="${rowStyle}">
      <td>${nameCell}</td>
      <td>${slotCell}</td>
      <td style="font-size:12px;color:var(--text-muted)">${f.breakdown}</td>
      <td>${feeCell}</td>
      ${isAdmin ? `<td>${editBtn}</td>` : ''}
    </tr>`;
  }).join('');

  const adminThHtml = isAdmin ? '<th></th>' : '';

  const myFee = fees.find(f => f.member === currentUser);
  const myFeeHtml = (!isGuest && myFee && myFee.fee > 0) ? `
    <div style="margin-top:14px;padding:12px 16px;background:var(--primary-light);border-radius:8px;font-size:15px;">
      您（${currentUser}）本週費用：<strong style="color:var(--primary-dark);font-size:18px;">${myFee.fee} 元</strong>
    </div>` : '';

  const sessionTotal = fees.reduce((s, f) => s + f.fee, 0);
  const feeSummaryHtml = `
    <div class="fee-breakdown" style="margin-top:12px;">
      <div class="fee-row"><span>場地費用（本場）</span><span>${RATE} 元</span></div>
      <div class="fee-row total"><span>本場分攤合計（使用無條件進位法）</span><span>${sessionTotal} 元</span></div>
    </div>`;

  el.innerHTML = `
    <div class="card">
      <div class="card-title">[報名] ${fmtDisplay(dateStr)}</div>
      ${slotSelectorHtml}
      <div id="attend-fee-section">
        ${warnHtml}
        <div class="table-wrap">
          <table>
            <thead><tr><th>成員</th><th>時段</th><th>費用明細</th><th>應付</th>${adminThHtml}</tr></thead>
            <tbody>${tableRows}</tbody>
          </table>
        </div>
        ${myFeeHtml}
        ${feeSummaryHtml}
      </div>
    </div>
`;
}

async function toggleMySlot(dateStr, slotId) {
  if (slotId === null) {
    delete currentDateData[currentUser];
  } else {
    currentDateData[currentUser] = slotId;
  }
  await saveAttendDoc(dateStr, currentDateData);
  await addLog({ action: '修改自己出席時段', detail: `${dateStr} -> ${slotId || '不參加'}` });
  showToast('已儲存', 'success');

  // Update slot selector checkboxes without full re-render
  TIME_SLOTS.forEach(s => {
    const el = document.getElementById(`myslot_${s.id}`);
    if (el) {
      const checked = currentDateData[currentUser] === s.id;
      el.classList.toggle('checked', checked);
      el.querySelector('.cb').textContent = checked ? 'v' : '';
    }
  });
  const noneEl = document.getElementById('myslot_none');
  const noneChecked = !currentDateData[currentUser];
  noneEl.classList.toggle('checked', noneChecked);
  noneEl.querySelector('.cb').textContent = noneChecked ? 'v' : '';

  // Immediately refresh the fee table below
  refreshAttendFeeTable(dateStr);
}

  const attendeeCount = computeHourCount(currentDateData, members);
  const today = new Date(); today.setHours(0,0,0,0);
  const satDate = new Date(dateStr + 'T00:00:00');
  const monBefore = new Date(satDate); monBefore.setDate(satDate.getDate() - 5);
  const friBefore = new Date(satDate); friBefore.setDate(satDate.getDate() - 1);
  const needsAllSplit = (attendeeCount === 0 || (attendeeCount > 0 && attendeeCount < MIN_PLAYERS)) && today >= monBefore;
  const forceAllSplit = needsAllSplit;
  const urgentSplit = needsAllSplit && today >= friBefore;
  const fees = forceAllSplit ? computeFeesForceAll(members, currentDateData) : computeFees(currentDateData, attendeeCount, members);
  const belowMin = !forceAllSplit && attendeeCount > 0 && attendeeCount < MIN_PLAYERS;

  const warnHtml = forceAllSplit ? `
    <div style="background:${urgentSplit ? '#fff3cd' : '#f5f5f5'};border-left:3px solid ${urgentSplit ? '#f0ad4e' : '#aaa'};border-radius:0 8px 8px 0;padding:10px 14px;margin-bottom:12px;font-size:13px;color:${urgentSplit ? '#7a5c00' : '#555'};">
      <strong>[${urgentSplit ? '!' : 'i'}] 出席人數不足（目前 ${attendeeCount} 人）</strong> - 場地費用由全體 ${members.length} 人均分
    </div>` : '';

  const tableRows = fees.map(f => {
    const isMe = f.member === currentUser;
    const forceRow = f.forceAll;
    const rowStyle = isMe ? 'background:var(--primary-light)' : (forceRow && urgentSplit ? 'background:#fff8e1' : '');
    const nameCell = isMe ? `<strong>> ${f.member}（你）</strong>` : f.member;
    const slotCell = f.slotId
      ? `<span class="badge badge-green">${TIME_SLOTS.find(s=>s.id===f.slotId)?.label}</span>`

    const feeCell = f.fee > 0

    return `<tr style="${rowStyle}">

  }).join('');

  const adminThHtml = isAdmin ? '<th></th>' : '';

    <div style="margin-top:14px;padding:12px 16px;background:var(--primary-light);border-radius:8px;font-size:15px;">
      您（${currentUser}）本週費用：<strong style="color:var(--primary-dark);font-size:18px;">${myFee.fee} 元</strong>
    </div>` : '';

  const sessionTotal2 = fees.reduce((s, f) => s + f.fee, 0);
  const feeSumHtml = `
    <div class="fee-breakdown" style="margin-top:12px;">
      <div class="fee-row"><span>場地費用（本場）</span><span>${RATE} 元</span></div>
      <div class="fee-row total"><span>本場分攤合計（使用無條件進位法）</span><span>${sessionTotal2} 元</span></div>
    </div>`;

  const container = document.getElementById('attend-fee-section');
  if (container) {
    container.innerHTML = warnHtml + `
      <div class="table-wrap">
        <table>
          <thead><tr><th>成員</th><th>時段</th><th>費用明細</th><th>應付</th>${adminThHtml}</tr></thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>
      ${myFeeHtml}` + feeSumHtml;
  }
}

function renderAdminAttendance(dateStr) {

  el.innerHTML = `

        <div class="card-title" style="margin-bottom:0">[編輯] ${fmtDisplay(dateStr)} - 管理者編輯</div>
        <button class="btn btn-danger btn-sm" onclick="showDeleteAttendModal('${dateStr}')">[刪] 刪除此日記錄</button>

// Compute total prepaid from all members
function getTotalPrepaid() {
  return getMembersConfig().filter(m => m.role !== 'guest').reduce((s, m) => s + (m.prepaid || 0), 0);
}
// Compute total court fees paid
function getTotalCourtFees() {
  return getFundLog().filter(e => e.type === 'court').reduce((s, e) => s + e.amount, 0);
}
// Compute total per-session deductions (sum of all session fees paid by members)
function getTotalSessionDeductions() {
  return getFundLog().filter(e => e.type === 'session').reduce((s, e) => s + e.amount, 0);
}
function getPublicFundBalance() {
  return getTotalPrepaid() - getTotalCourtFees() - getTotalSessionDeductions();
}

// ===========================================================
// FEE OVERVIEW
// ===========================================================
async function loadFeeOverview() {
  const dateStr = document.getElementById('attend-date').value || fmt(nextSaturday(new Date()));
  // Refresh from cloud
  const cloudMc = await cloudGet('membersConfig');
  if (cloudMc) lsSet('membersConfig', cloudMc);
  const cloudFund = await cloudGet('fundLog');
  if (cloudFund) lsSet('fundLog', cloudFund);
  const cloudAtt = await cloudGet(`att_${dateStr}`);
  if (cloudAtt) lsSet(`att_${dateStr}`, cloudAtt);
  const data = getAttendDoc(dateStr);
  const members = getMemberNames();
  const attendeeCount = computeHourCount(data, members);
  const fees = computeFees(data, attendeeCount, members);
  const total = fees.reduce((s, f) => s + f.fee, 0);

  // Public fund summary
  const totalPrepaid = getTotalPrepaid();
  const totalCourt   = getTotalCourtFees();
  const fundBal      = totalPrepaid - totalCourt;
  const fundBalColor = fundBal >= 0 ? 'var(--primary)' : 'var(--danger)';

  // Build timeline entries: combine member prepaid (as income) + court fees (as expense)
  // Each entry: { ts, type, label, amount, sign }
  const fundEntries = [];
  // Member prepaid shown as income entries (use a synthetic early ts so they sort first)
  // 用 mhist_ 取得每筆儲值的實際時間
  getMembersConfig().filter(m => m.role !== 'guest').forEach(m => {
    const hist = getMemberHistory(m.name);
    hist.filter(e => e.type === 'add').forEach(e => {
      fundEntries.push({ ts: e.ts, type: 'income', label: `${m.name} 儲值`, amount: e.amount, sign: 1 });
    });
    hist.filter(e => e.type === 'refund').forEach(e => {
      fundEntries.push({ ts: e.ts, type: 'income', label: `${m.name} 退款`, amount: e.amount, sign: -1 });
    });
  });
  // Court fee entries from log - track original index for deletion
  getFundLog().forEach((e, i) => {
    const lbl = e.type === 'court' ? '[繳球場費]' : '[場次扣款]';
    fundEntries.push({ ts: e.ts, type: 'expense', label: `${lbl}${e.note ? ' '+e.note : ''}`, amount: e.amount, sign: -1, fundIdx: i });
  });
  // Sort oldest first (ascending)
  fundEntries.sort((a, b) => a.ts.localeCompare(b.ts));
  // Compute running balance
  let running = 0;
  const fundTableRows = fundEntries.length === 0
    ? '<tr><td colspan="6" style="text-align:center;color:var(--text-muted);padding:16px">尚無記錄</td></tr>'
    : fundEntries.map((e, idx) => {
        running += e.sign * e.amount;
        const dateLabel = new Date(e.ts).toLocaleDateString('zh-TW');
        const amtColor = e.sign > 0 ? 'var(--primary)' : 'var(--danger)';
        const amtTxt = (e.sign > 0 ? '+' : '-') + e.amount.toLocaleString() + ' 元';
        const balColor = running < 0 ? 'var(--danger)' : 'var(--primary)';
        const typeBadge = e.sign > 0
          ? '<span class="badge badge-green">入帳</span>'
          : '<span class="badge badge-red">支出</span>';
        // Only expense (court fee) entries can be deleted by admin; income entries cannot
        const delBtn = (isAdmin && e.type === 'expense')
          ? `<button class="btn btn-danger btn-sm" style="padding:2px 8px;font-size:11px;" onclick="deleteFundEntry(${e.fundIdx})">刪除</button>`
          : '';
        return `<tr>
          <td style="font-size:12px;color:var(--text-muted);white-space:nowrap">${dateLabel}</td>
          <td>${typeBadge}</td>
          <td style="font-size:13px">${e.label}</td>
          <td style="font-weight:600;color:${amtColor};white-space:nowrap">${amtTxt}</td>
          <td style="font-weight:700;color:${balColor};white-space:nowrap">${running.toLocaleString()} 元</td>
          <td>${delBtn}</td>
        </tr>`;
      }).join('');

  const adminCourtBtn = isAdmin ? `
    <div style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn btn-danger btn-sm" onclick="showCourtFeeModal()">設定繳球場季費</button>
    </div>` : '';

  document.getElementById('fee-overview-content').innerHTML = `
    <div class="card">
      <div class="card-title">[費用] 公費帳戶概覽</div>

      <div style="font-size:13px;font-weight:600;margin-bottom:10px;color:var(--text-muted)">收支記錄（由舊到新）</div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>日期</th><th>類型</th><th>說明</th><th>金額</th><th>餘額</th><th></th></tr></thead>
          <tbody>${fundTableRows}</tbody>
        </table>
      </div>
      ${adminCourtBtn}
    </div>`;
}

async function loadMembersTab() {
  document.getElementById('members-admin-box').style.display = isAdmin ? '' : 'none';
  document.getElementById('members-info-box').style.display  = isAdmin ? 'none' : '';
  document.getElementById('add-member-btn').style.display    = isAdmin ? '' : 'none';
  const opTh = document.getElementById('members-op-th');
  if (opTh) opTh.style.display = isAdmin ? '' : 'none';
  // Refresh from cloud
  const cloudMc = await cloudGet('membersConfig');
  if (cloudMc) lsSet('membersConfig', cloudMc);

  const cfg = getMembersConfig().filter(m => m.role !== 'guest');
  const members = getMemberNames();
  const todayStr = fmt(new Date());

  // 計算每位成員在「今天以前（含今天）所有場次」的累計費用
  const sessionDeductions = {};
  members.forEach(n => sessionDeductions[n] = 0);

  const pastDates = getHistoryDates().filter(d => d <= todayStr);
  for (const d of pastDates) {
    const data = getAttendDoc(d);
    const hc = computeHourCount(data, members);
    if (hc === 0) continue; // 無人出席，不收費
    const fees = computeFees(data, hc, members);
    fees.forEach(f => {
      if (f.fee > 0) sessionDeductions[f.member] = (sessionDeductions[f.member] || 0) + f.fee;
    });
  }

  document.getElementById('member-stats').innerHTML = '';

  document.getElementById('members-tbody').innerHTML = cfg.map(m => {
    const totalDeducted = sessionDeductions[m.name] || 0;
    const bal = (m.prepaid||0) - totalDeducted;
    const ROLE_TITLES = { 'June': '財務', 'Frank': '公關', 'Kenny': '網管' };
    const roleLabel = m.role === 'admin'
      ? `<span class="badge badge-green">${ROLE_TITLES[m.name] || '管理者'}</span>`
      : m.role === 'guest'
        ? '<span class="badge badge-gray">遊客</span>'
        : '<span class="badge badge-green">會員</span>';
    const editBtns = isAdmin ? ` <button class="btn btn-admin btn-sm" onclick="showPrepaidModal('${m.name}')">儲值/退款</button>` : '';
    const delBtn = isAdmin ? `<button class="btn btn-danger btn-sm" onclick="showRemoveMemberModal('${m.name}')">- 移除會員帳號</button>` : '';
    const histBtn = `<button class="btn btn-secondary btn-sm" style="padding:2px 8px;font-size:11px;" onclick="showMemberHistModal('${m.name}')">記錄</button>`;
    return `<tr>
      <td><strong>${m.name}</strong></td>
      <td>${roleLabel}</td>
      <td><strong style="color:${bal<=0?'var(--danger)':bal<500?'var(--accent)':'var(--primary)'}">${bal.toLocaleString()} 元</strong>${editBtns}</td>
      <td>${histBtn}</td>
      ${isAdmin ? `<td>${delBtn}</td>` : ''}
    </tr>`;
  }).join('');
}

  const amt = parseInt(document.getElementById('modal-new-prepaid').value) || 0;
  const after = type === 'add' ? current + amt : current - amt;
  const preview = document.getElementById('modal-prepaid-preview');
  const afterEl = document.getElementById('modal-prepaid-after');
  if (amt > 0) {
    preview.style.display = 'block';
    afterEl.textContent = after.toLocaleString() + ' 元';
    afterEl.style.color = after < 0 ? 'var(--danger)' : 'var(--primary)';
  } else {
    preview.style.display = 'none';
  }
}

async function confirmUpdatePrepaid() {
  const amt = parseInt(document.getElementById('modal-new-prepaid').value) || 0;
  const type = document.getElementById('modal-prepaid-type').value;
  const note = document.getElementById('modal-prepaid-note').value.trim();
  if (amt <= 0) { showToast('請輸入金額', 'error'); return; }
  const cfg = getMembersConfig();
  const m = cfg.find(x => x.name === pendingPrepaidMember);
  if (!m) return;
  const oldVal = m.prepaid || 0;
  if (type === 'add') {
    m.prepaid = oldVal + amt;
    await addMemberHistory(pendingPrepaidMember, { type: 'add', amount: amt, before: oldVal, after: m.prepaid, note });
    await addLog({ action: `${pendingPrepaidMember} 新增儲值`, detail: `+${amt.toLocaleString()} 元 (${oldVal.toLocaleString()} -> ${m.prepaid.toLocaleString()})${note?' 備註:'+note:''}` });
    showToast(`${pendingPrepaidMember} 已儲值 ${amt.toLocaleString()} 元`, 'success');
  } else {
    m.prepaid = oldVal - amt;
    await addMemberHistory(pendingPrepaidMember, { type: 'refund', amount: amt, before: oldVal, after: m.prepaid, note });
    await addLog({ action: `${pendingPrepaidMember} 退款`, detail: `-${amt.toLocaleString()} 元 (${oldVal.toLocaleString()} -> ${m.prepaid.toLocaleString()})${note?' 備註:'+note:''}` });
    showToast(`${pendingPrepaidMember} 已退款 ${amt.toLocaleString()} 元`, 'success');
  }
  await saveMembersConfig(cfg);
  closeModal('modal-prepaid');
  loadMembersTab();
}

// ===========================================================
// FEE CALCULATION
// ===========================================================
function computeFeesForceAll(members, data) {
  // 人數不足，強制全員均分，但保留已報名者的時段標記
  data = data || {};
  const perPerson = Math.ceil(RATE / members.length);
  return members.map(member => ({
    member,
    slotId: data[member] || null,
    fee: perPerson,
    breakdown: `${RATE} / ${members.length}人(全員均分) = ${perPerson}元`,
    belowMin: false,
    forceAll: true
  }));
}

function computeHourCount(data, members) {
  let count = 0;
  for (const [m, slotId] of Object.entries(data)) {
    if (slotId && members.includes(m)) count++;
  }
  return count;
}

function computeFees(data, attendeeCount, members) {
  const belowMin = attendeeCount > 0 && attendeeCount < MIN_PLAYERS;
  // If below min players, split across ALL members; otherwise split among attendees only
  const divisor = (attendeeCount === 0 || belowMin) ? members.length : attendeeCount;
  const perPerson = Math.ceil(RATE / divisor);
  const note = belowMin
    ? `人數不足${MIN_PLAYERS}人，暫由全體${members.length}人均分`
    : '';
  return members.map(member => {
    const slotId = data[member];
    if (!slotId) {
      // Non-attendees also pay share when below min
      const sharedFee = belowMin ? perPerson : 0;
      const bd = belowMin ? `未到場但人數未滿${MIN_PLAYERS}人需分攤` : '未報名';
      return { member, slotId: null, fee: sharedFee, breakdown: bd, belowMin };
    }
    return {
      member, slotId, fee: perPerson,
      breakdown: belowMin
        ? `${RATE} / ${members.length}人(全體均分) = ${perPerson}元`
        : `${RATE} / ${attendeeCount}人 = ${perPerson}元`,
      belowMin, note
    };
  });
}

function renderFeeTable(attendeeCount, fees) {
  const cnt = attendeeCount > 0 ? attendeeCount : 0;
  const belowMin = cnt > 0 && cnt < MIN_PLAYERS;
  const totalFee = fees.reduce((s, f) => s + f.fee, 0);

  const warningHtml = belowMin ? `
    <div style="background:#fff3cd;border-left:3px solid #f0ad4e;border-radius:0 8px 8px 0;padding:10px 14px;margin-bottom:12px;font-size:13px;color:#7a5c00;">
      <strong>[!] 人數未滿 ${MIN_PLAYERS} 人（目前 ${cnt} 人）</strong><br>
      費用暫由全體 ${fees.length} 人均分。待人數滿 ${MIN_PLAYERS} 人後，將僅由出席者分攤。
    </div>` : '';

  // When below min, show all members; otherwise only show attendees + summary
  const rows = belowMin
    ? fees
    : fees;

  return `
    ${warningHtml}
    <div style="font-size:13px;color:var(--text-muted);margin-bottom:10px;">
      本場出席人數：<strong>${cnt}</strong> 人
      ${cnt > 0 ? `，每人費用：<strong>${fees.find(f=>f.slotId)?.fee ?? '-'}</strong> 元` : ''}
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>姓名</th><th>時段</th><th>費用明細</th><th>應付</th></tr></thead>
        <tbody>
          ${rows.map(f=>`<tr style="${f.belowMin && !f.slotId ? 'background:#fff8e1' : f.slotId ? '' : ''}">
            <td>${f.member}</td>
            <td>${f.slotId
              ? `<span class="badge badge-green">${TIME_SLOTS.find(s=>s.id===f.slotId)?.label}</span>`
              : (f.belowMin
                  ? '<span class="badge badge-amber">未出席(分攤)</span>'
                  : '<span class="badge badge-gray">未報名</span>'
                )
            }</td>
            <td style="font-size:12px;color:var(--text-muted)">${f.breakdown}</td>
            <td><strong style="color:${f.fee>0?'inherit':'var(--text-light)'}">${f.fee>0 ? f.fee+' 元' : '-'}</strong></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
    <div style="text-align:right;font-size:13px;color:var(--text-muted);margin-top:6px;">
      本場應收合計：<strong>${totalFee} 元</strong>（場地費 ${RATE} 元）
    </div>`;
}

// ===========================================================
// MODALS & TOAST
// ===========================================================
function closeModal(id) { document.getElementById(id).style.display = 'none'; }

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove('show'), 3000);
}

function showCourtFeeModal() {
  if (!isAdmin) return;
  document.getElementById('modal-court-amount').value = '';
  document.getElementById('modal-court-note').value = '';
  document.getElementById('modal-court-fee').style.display = 'flex';
}
async function confirmCourtFee() {
  const amount = parseInt(document.getElementById('modal-court-amount').value) || 0;
  const note = document.getElementById('modal-court-note').value.trim();
  if (amount <= 0) { showToast('請輸入金額', 'error'); return; }
  await addFundEntry({ type: 'court', amount, note });
  addLog({ action: '設定繳球場季費', detail: `${amount.toLocaleString()} 元 ${note}` });
  showToast(`已記錄：季繳 ${amount.toLocaleString()} 元`, 'success');
  closeModal('modal-court-fee');
  loadFeeOverview();
}

// ===========================================================
// ADMIN SLOT EDIT (inline on attend page)
// ===========================================================
let adminSlotMember = null;
let adminSlotDate = null;
let adminSlotPending = null;

function showAdminSlotModal(member, dateStr) {
  if (!isAdmin) return;
  adminSlotMember = member;
  adminSlotDate = dateStr;
  adminSlotPending = currentDateData[member] || null;

  document.getElementById('modal-admin-slot-title').textContent = `[管] 編輯出席 - ${member}`;
  document.getElementById('modal-admin-slot-sub').textContent = `${fmtDisplay(dateStr)}  |  目前：${adminSlotPending ? TIME_SLOTS.find(s=>s.id===adminSlotPending)?.label : '未報名'}`;

  const checksEl = document.getElementById('modal-admin-slot-checks');
  checksEl.innerHTML = TIME_SLOTS.map(s => `
    <div class="slot-check ${adminSlotPending === s.id ? 'checked' : ''}" id="aslot_${s.id}"
         onclick="selectAdminSlot('${s.id}')">
      <div class="cb">${adminSlotPending === s.id ? 'v' : ''}</div> ${s.label}
    </div>`).join('') + `
    <div class="slot-check ${!adminSlotPending ? 'checked' : ''}" id="aslot_none"
         onclick="selectAdminSlot(null)">
      <div class="cb">${!adminSlotPending ? 'v' : ''}</div> 不參加
    </div>`;

  document.getElementById('modal-admin-slot').style.display = 'flex';
}

function selectAdminSlot(slotId) {
  adminSlotPending = slotId;
  TIME_SLOTS.forEach(s => {
    const el = document.getElementById(`aslot_${s.id}`);
    if (!el) return;
    const checked = adminSlotPending === s.id;
    el.classList.toggle('checked', checked);
    el.querySelector('.cb').textContent = checked ? 'v' : '';
  });
  const noneEl = document.getElementById('aslot_none');
  const noneChecked = !adminSlotPending;
  noneEl.classList.toggle('checked', noneChecked);
  noneEl.querySelector('.cb').textContent = noneChecked ? 'v' : '';
}

async function confirmAdminSlotEdit() {
  if (!adminSlotMember || !adminSlotDate) return;
  if (adminSlotPending) {
    currentDateData[adminSlotMember] = adminSlotPending;
  } else {
    delete currentDateData[adminSlotMember];
  }
  await saveAttendDoc(adminSlotDate, currentDateData);
  await addLog({ action: `管理者修改 ${adminSlotMember} 出席`, detail: `${adminSlotDate} -> ${adminSlotPending || '不參加'}` });
  showToast(`已更新 ${adminSlotMember} 的出席`, 'success');
  closeModal('modal-admin-slot');
  // Re-render the full attend page to reflect changes
  renderAttendance(adminSlotDate);
}

async function showMemberHistModal(name) {
  document.getElementById('modal-hist-title').textContent = `${name} - 歷史記錄`;
  const cloudHist = await cloudGet('mhist_' + name);
  if (cloudHist) lsSet('mhist_' + name, cloudHist);

  // 合併：儲值記錄 + 場次扣款
  const members = getMemberNames();
  const todayStr = fmt(new Date());
  const entries = [];

  // 儲值記錄
  getMemberHistory(name).forEach(e => {
    const isAdd = e.type === 'add';
    entries.push({
      ts: e.ts,
      type: isAdd ? 'add' : 'refund',
      amount: isAdd ? e.amount : -e.amount,
      note: e.note || ''
    });
  });

  // 場次扣款（今天以前含今天）
  getHistoryDates().filter(d => d <= todayStr).forEach(d => {
    const data = getAttendDoc(d);
    const hc = computeHourCount(data, members);
    if (hc === 0) return;
    const fees = computeFees(data, hc, members);
    const f = fees.find(x => x.member === name);
    if (f && f.fee > 0) {
      entries.push({
        ts: d + 'T23:59:00',
        type: 'session',
        amount: -f.fee,
        note: `${d} 場次費用`
      });
    }
  });

  // 按時間排序（舊到新）
  entries.sort((a, b) => a.ts.localeCompare(b.ts));

  const tbody = document.getElementById('modal-hist-tbody');
  if (entries.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:16px">尚無記錄</td></tr>';
  } else {
    let running = 0;
    tbody.innerHTML = entries.map(e => {
      running += e.amount;
      const dateStr = e.ts.startsWith('2') ? e.ts.substring(0, 10) : new Date(e.ts).toLocaleDateString('zh-TW');
      const isIncome = e.amount > 0;
      const typeBadge = e.type === 'add'
        ? '<span class="badge badge-green">儲值</span>'
        : e.type === 'refund'
          ? '<span class="badge badge-red">退款</span>'
          : '<span class="badge badge-amber">場次扣款</span>';
      const amtColor = isIncome ? 'var(--primary)' : 'var(--danger)';
      const amtTxt = (isIncome ? '+' : '') + e.amount.toLocaleString() + ' 元';
      const balColor = running <= 0 ? 'var(--danger)' : running < 500 ? 'var(--accent)' : 'var(--primary)';
      return `<tr>
        <td style="font-size:12px;white-space:nowrap">${dateStr}</td>
        <td>${typeBadge}</td>
        <td style="font-weight:600;color:${amtColor};white-space:nowrap">${amtTxt}</td>
        <td style="font-weight:700;color:${balColor};white-space:nowrap">${running.toLocaleString()} 元</td>
        <td style="font-size:12px;color:var(--text-muted)">${e.note || '-'}</td>
      </tr>`;
    }).join('');
  }
  document.getElementById('modal-member-hist').style.display = 'flex';
}

async function deleteFundEntry(idx) {
  if (!isAdmin) return;
  const log = getFundLog();
  if (idx < 0 || idx >= log.length) return;
  const entry = log[idx];
  const label = entry.note ? entry.note : entry.type;
  if (!confirm(`確定要刪除此支出記錄？\n${new Date(entry.ts).toLocaleDateString('zh-TW')} - ${entry.amount.toLocaleString()} 元 - ${label}`)) return;
  log.splice(idx, 1);
  lsSet('fundLog', log);
  await cloudSet('fundLog', log);
  await addLog({ action: '刪除公費支出記錄', detail: `${label} ${entry.amount.toLocaleString()} 元` });
  showToast('已刪除支出記錄', 'success');
  loadFeeOverview();
}
